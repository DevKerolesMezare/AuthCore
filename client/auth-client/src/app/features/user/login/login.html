<div class="fade-page">
  <div class="register-container">
    <div class="login-container">
      <h2>Welcome Back</h2>
      <p>Sign in to continue</p>
<form class="login-form" [formGroup]="loginForm">

  <div class="form-group">
    <label>Email</label>

    <input
      type="email"
      placeholder="Enter your email"
      formControlName="email"
    />

    @if (getError('email')) {
      <span class="error">Email is invalid</span>
    }
  </div>

  <div class="form-group">
    <label>Password</label>

    <input
      type="password"
      placeholder="Enter your password"
      formControlName="password"
    />

    @if (getError('password')) {
      <span class="error">Password is invalid</span>
    }
  </div>

  <button type="submit" (click)="onSignIn()">
    Sign In
  </button>

  <div class="register-link">
    Don’t have an account?
    <a routerLink="/signup">Create Account</a>
  </div>

</form>
    </div>
  </div>
</div>
